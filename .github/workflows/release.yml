name: Create Release on Push Package.json

on:
  push:
    paths:
      - plugin.json
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          fetch-tags: true

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Package
        run: zip -r package.zip . -i 'index.*' 'style.css' 'font-face.css' 'icon.png' 'preview.png' 'plugin.json' 'README*.md' 'fonts/*'

      - name: Get version
        uses: emptylight370/jq-action@v1
        id: version
        with:
          data: plugin.json
          filter: .version

      - name: Generate release description
        run: |
          conventional-changelog -i release.md -s -n conventional-changelog.config.json -k plugin.json -c plugin.json
          prettier -w release.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: package.zip
          name: Release ${{ steps.version.outputs.result }}
          tag_name: ${{ steps.version.outputs.result }}
          make_latest: true
          body_path: release.md
